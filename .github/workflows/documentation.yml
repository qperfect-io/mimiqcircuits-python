name: Docs

on:
  push:
    tags:
      - "v*"
    branches:
      - main
      - devel
  pull_request:
    branches:
      - devel

jobs:
  docs:
    permissions:
      contents: write
    name: Documentation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tools
        run: |
          sudo apt update
          sudo apt-get install build-essential gfortran libopenblas-dev

      - name: Install dependencies
        run: |
          uv sync --group docs

      - name: Sphinx build
        run: |
          uv run sphinx-build docs _build

      - name: Deploy
        if: github.repository == 'qperfect-io/mimiqcircuits-python' && startsWith(github.ref, 'refs/tags/')
        uses: peaceiris/actions-gh-pages@v3
        with:
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _build/
          force_orphan: true
